<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js"></script>
<script>
// ── Menu wallet logic ──
const BASE_CHAIN_ID_MENU = 8453n;
const BASE_RPC_MENU      = 'https://api.developer.coinbase.com/rpc/v1/base/bc_otm6g9zw';

function shorten(a){ return a.slice(0,5)+'…'+a.slice(-4); }

function showToast(msg, type, ms){
  ms = ms || 3500;
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type || ''; t.style.display = 'block';
  clearTimeout(t._t); t._t = setTimeout(function(){ t.style.display = 'none'; }, ms);
}

function setWalletUI(addr){
  const btn = document.getElementById('btn-wallet');
  const lbl = document.getElementById('wallet-label');
  if(addr){ lbl.textContent = shorten(addr); btn.classList.add('connected'); }
  else    { lbl.textContent = 'Connect Wallet'; btn.classList.remove('connected'); }
}

function setLight(color){
  ['red','yellow','green'].forEach(function(c){
    const on = c === color;
    document.getElementById('bulb-l-'+c).className = 'bulb' + (on ? ' '+c+'-on' : '');
    document.getElementById('bulb-r-'+c).className = 'bulb' + (on ? ' '+c+'-on' : '');
  });
}

async function connectWallet(){
  if(!window.ethereum){ showToast('🦊 No EVM wallet found.','error'); return false; }
  try {
    const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
    if(!accounts || !accounts.length) throw new Error('no accounts');
    const chainHex = await window.ethereum.request({method:'eth_chainId'});
    if(BigInt(chainHex) !== BASE_CHAIN_ID_MENU){
      try {
        await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:'0x2105'}]});
      } catch(e){
        if(e.code===4902){
          await window.ethereum.request({method:'wallet_addEthereumChain',params:[{
            chainId:'0x2105', chainName:'Base',
            nativeCurrency:{name:'Ether',symbol:'ETH',decimals:18},
            rpcUrls:[BASE_RPC_MENU], blockExplorerUrls:['https://basescan.org']
          }]});
        } else throw e;
      }
    }
    const provider = new ethers.BrowserProvider(window.ethereum);
    const signer   = await provider.getSigner();
    const address  = await signer.getAddress();
    window._walletProvider = provider;
    window._walletSigner   = signer;
    window._walletAddress  = address;
    setWalletUI(address);
    showToast('✓ Connected — '+shorten(address), 'success');
    return true;
  } catch(e){ console.error(e); showToast('Connection failed.','error'); return false; }
}

function runCountdownThenStart(){
  const btnStart = document.getElementById('btn-start');
  const cd       = document.getElementById('countdown-overlay');
  btnStart.style.display = 'none';
  cd.style.display = 'block';
  setLight('red'); cd.textContent = '';
  setTimeout(function(){ setLight('yellow'); cd.textContent = ''; }, 1000);
  setTimeout(function(){
    setLight('green');
    cd.style.color = '#22c55e';
    cd.style.textShadow = '0 0 40px #22c55e';
    cd.textContent = 'GO!';
  }, 2000);
  setTimeout(function(){
    cd.style.display = 'none';
    cd.style.color = '';
    cd.style.textShadow = '';
    setLight('off');
    // Show game screen
    document.getElementById('game-root').classList.add('active');
    // startGame is defined in game.js
    if(typeof startGame === 'function') startGame();
  }, 3000);
}

document.getElementById('btn-wallet').addEventListener('click', async function(){
  if(window._walletAddress) return;
  await connectWallet();
});

document.getElementById('btn-start').addEventListener('click', async function(){
  if(!window._walletAddress){
    const ok = await connectWallet();
    if(!ok) return;
  }
  runCountdownThenStart();
});

document.getElementById('btn-pause').addEventListener('click', function(){
  if(typeof togglePause === 'function') togglePause();
});

document.getElementById('btn-play-again').addEventListener('click', function(){
  document.getElementById('gameover-card').classList.remove('show');
  if(typeof startGame === 'function') startGame();
});

document.getElementById('btn-to-menu').addEventListener('click', function(){
  document.getElementById('gameover-card').classList.remove('show');
  document.getElementById('game-root').classList.remove('active');
  document.getElementById('btn-start').style.display = '';
  setLight('off');
});

document.getElementById('btn-menu-leaderboard').addEventListener('click', function(){
  showLeaderboard();
});

document.getElementById('btn-close-lb').addEventListener('click', function(){
  const ov = document.getElementById('leaderboard-overlay');
  ov.style.display = 'none';
});

async function showLeaderboard() {
  const ov  = document.getElementById('leaderboard-overlay');
  const st  = document.getElementById('lb-status');
  const tbl = document.getElementById('lb-table');
  ov.style.display  = 'flex';
  tbl.style.display = 'none';
  st.style.display  = 'block';
  st.textContent    = 'Loading from Base...';

  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    const c = new ethers.Contract(
      '0x15609841b39Ae42EdE65832bE9FA9c3ec00282C4',
      [{name:'getBoard',type:'function',stateMutability:'view',inputs:[],outputs:[{name:'',type:'tuple[]',components:[
        {name:'player',type:'address'},{name:'score',type:'uint32'},
        {name:'timeSeconds',type:'uint32'},{name:'timestamp',type:'uint64'}
      ]}]}],
      provider
    );

    const myAddr = (await provider.listAccounts())[0]?.address?.toLowerCase() || '';
    const board  = await c.getBoard();

    // Sort by score descending
    const sorted = [...board].sort((a,b) => Number(b.score) - Number(a.score));

    if (sorted.length === 0) {
      st.textContent = 'No scores yet. Be the first!';
      return;
    }

    st.style.display = 'none';
    tbl.style.display = 'block';

    const rows = sorted.map((e, i) => {
      const addr    = e.player.toLowerCase();
      const isMe    = addr === myAddr;
      const short   = e.player.slice(0,6) + '...' + e.player.slice(-4);
      const rank    = i + 1;
      const medal   = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
      const bg      = isMe ? 'rgba(0,82,255,.18)' : i % 2 === 0 ? 'rgba(255,255,255,.03)' : 'transparent';
      const border  = isMe ? '1px solid rgba(0,82,255,.4)' : '1px solid transparent';
      return `<div style="display:flex;align-items:center;padding:10px 12px;border-radius:10px;background:${bg};border:${border};margin-bottom:4px;gap:10px;">
        <div style="width:32px;text-align:center;font-size:${rank<=3?'18':'13'}px;color:${isMe?'#60A5FA':'#6b8cae'};flex-shrink:0;">${medal}</div>
        <div style="flex:1;font-family:monospace;font-size:13px;color:${isMe?'#93C5FD':'#cdd6f4'};">
          ${short}${isMe?' <span style="color:#60A5FA;font-size:11px;font-family:Arial;">(you)</span>':''}
        </div>
        <div style="font-size:15px;font-weight:900;color:${isMe?'#60A5FA':'#fff'};margin-right:8px;">${e.score}</div>
        <div style="font-size:11px;color:#6b8cae;">${e.timeSeconds}s</div>
      </div>`;
    }).join('');

    tbl.innerHTML = `<div style="font-size:11px;color:#6b8cae;text-align:right;margin-bottom:8px;">${sorted.length} players</div>` + rows;

  } catch(err) {
    st.textContent = 'Failed to load: ' + (err.message || 'unknown error');
  }
}

// Auto-reconnect if already authorized
window.addEventListener('load', async function(){
  setLight('off');
  if(window.ethereum){
    try {
      const accounts = await window.ethereum.request({method:'eth_accounts'});
      if(accounts && accounts.length){
        const p = new ethers.BrowserProvider(window.ethereum);
        const s = await p.getSigner();
        const a = await s.getAddress();
        window._walletProvider = p;
        window._walletSigner   = s;
        window._walletAddress  = a;
        setWalletUI(a);
      }
    } catch(e){ console.error(e); }

    window.ethereum.on('accountsChanged', async function(accs){
      if(accs && accs.length){
        const p = new ethers.BrowserProvider(window.ethereum);
        const s = await p.getSigner();
        window._walletProvider = p;
        window._walletSigner   = s;
        window._walletAddress  = accs[0];
        setWalletUI(accs[0]);
      } else {
        window._walletProvider = null;
        window._walletSigner   = null;
        window._walletAddress  = null;
        setWalletUI(null);
      }
    });
  }
});
</script>
