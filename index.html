<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rally X — Racing Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'Arial Black', Arial, sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Sky */
  .sky {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 38%;
    background: linear-gradient(to bottom, #0d1117 0%, #1a2a1a 60%, #2d4a2d 100%);
  }

  /* Ground */
  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 62%;
    background: #1a1a1a;
  }

  /* Grass sides */
  .grass-left, .grass-right {
    position: absolute;
    bottom: 0;
    height: 62%;
    width: 28%;
    background: repeating-linear-gradient(
      90deg,
      #1a3a1a 0px, #1a3a1a 6px,
      #162e16 6px, #162e16 12px
    );
  }
  .grass-left { left: 0; }
  .grass-right { right: 0; }

  /* Horizon glow */
  .horizon-glow {
    position: absolute;
    top: 36%;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: 6%;
    background: radial-gradient(ellipse at center, #1e4d1e55 0%, transparent 70%);
  }

  /* Traffic light poles */
  .light-pole {
    position: absolute;
    bottom: 40%;
    width: 10px;
    height: 180px;
    background: #444;
    border-radius: 2px;
    z-index: 10;
  }
  .light-pole-left  { left:  calc(50% - 190px); }
  .light-pole-right { right: calc(50% - 190px); }

  .light-arm {
    position: absolute;
    top: 20px;
    height: 10px;
    width: 60px;
    background: #444;
    border-radius: 2px;
  }
  .light-pole-left  .light-arm { left: 10px; }
  .light-pole-right .light-arm { right: 10px; }

  .traffic-light {
    position: absolute;
    background: #111;
    border: 2px solid #555;
    border-radius: 8px;
    padding: 8px 6px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    top: 0;
    z-index: 11;
  }
  .light-pole-left  .traffic-light { left:  60px; transform: translateX(-50%); }
  .light-pole-right .traffic-light { right: 60px; transform: translateX(50%);  }

  .bulb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid #333;
  }
  .bulb.red-on {
    background: #ff2020;
    animation: blinkRed 1.1s ease-in-out infinite;
  }
  .bulb.yellow { background: #2a2200; }
  .bulb.green  { background: #002210; }

  @keyframes blinkRed {
    0%, 100% { box-shadow: 0 0 14px #ff2020, 0 0 30px #ff000088; opacity: 1;    }
    50%       { box-shadow: 0 0  6px #ff2020, 0 0 10px #ff000044; opacity: 0.75; }
  }

  /* Vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 20;
  }

  /* Wallet button */
  .btn-wallet {
    position: absolute;
    top: 20px;
    right: 24px;
    z-index: 30;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.25);
    color: #e0e0e0;
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 10px 20px;
    border-radius: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-wallet:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.5);
  }
  .wallet-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    flex-shrink: 0;
  }

  /* Start button */
  .btn-start {
    position: absolute;
    bottom: 16%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    background: linear-gradient(90deg, #1a5fd4 0%, #c0192a 100%);
    border: none;
    color: #ffffff;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    padding: 18px 64px;
    cursor: pointer;
    border-radius: 14px;
    transition: filter 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-start:hover {
    filter: brightness(1.15);
    transform: translateX(-50%) scale(1.06);
  }
  .btn-start:active {
    transform: translateX(-50%) scale(0.97);
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="horizon-glow"></div>

<!-- Mountains & trees SVG -->
<svg style="position:absolute;top:10%;left:0;width:100%;height:32%;z-index:1;"
     viewBox="0 0 800 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <polygon points="0,180 60,90 130,140 210,70 280,130 360,60 430,120 510,50 580,110 660,40 730,100 800,60 800,200 0,200" fill="#0e2010"/>
  <polygon points="0,200 0,160 80,130 160,160 240,120 320,150 400,110 480,150 560,125 640,155 720,130 800,155 800,200" fill="#152a15"/>
  <!-- Trees left -->
  <g fill="#0a1f0a">
    <rect x="20"  y="100" width="8" height="60"/><polygon points="24,100 4,100 8,80 0,80 10,58 20,80 14,80"/>
    <rect x="50"  y="110" width="6" height="50"/><polygon points="53,110 37,110 42,90 34,90 44,70 53,90 48,90"/>
    <rect x="80"  y="115" width="7" height="45"/><polygon points="83,115 67,115 72,95 64,95 74,74 83,95 78,95"/>
    <rect x="108" y="120" width="6" height="40"/><polygon points="111,120 96,120 101,100 93,100 102,80 111,100 106,100"/>
  </g>
  <!-- Trees right -->
  <g fill="#0a1f0a">
    <rect x="720" y="100" width="8" height="60"/><polygon points="724,100 704,100 708,80 700,80 710,58 720,80 714,80"/>
    <rect x="745" y="110" width="6" height="50"/><polygon points="748,110 732,110 737,90 729,90 739,70 748,90 743,90"/>
    <rect x="763" y="115" width="7" height="45"/><polygon points="766,115 750,115 755,95 747,95 757,74 766,95 761,95"/>
    <rect x="786" y="120" width="6" height="40"/><polygon points="789,120 773,120 778,100 771,100 779,80 789,100 784,100"/>
  </g>
</svg>

<!-- Grass -->
<div class="grass-left"></div>
<div class="grass-right"></div>

<!-- Road SVG -->
<svg style="position:absolute;bottom:0;left:0;width:100%;height:62%;z-index:2;"
     viewBox="0 0 800 500" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <polygon points="400,0 800,500 0,500" fill="#252525"/>
  <polygon points="400,0 370,0 50,500 0,500"   fill="#333"/>
  <polygon points="400,0 430,0 750,500 800,500" fill="#333"/>
  <polygon points="392,0 380,0 70,500 95,500"   fill="#e0e0e0" opacity="0.7"/>
  <polygon points="408,0 420,0 730,500 705,500"  fill="#e0e0e0" opacity="0.7"/>
  <!-- Center dashes -->
  <polygon points="398,20  402,20  404,60  396,60"   fill="#f5c842" opacity="0.9"/>
  <polygon points="397,85  403,85  407,145 393,145"  fill="#f5c842" opacity="0.9"/>
  <polygon points="394,170 406,170 413,250 387,250"  fill="#f5c842" opacity="0.85"/>
  <polygon points="390,270 410,270 420,370 380,370"  fill="#f5c842" opacity="0.8"/>
  <polygon points="384,390 416,390 432,500 368,500"  fill="#f5c842" opacity="0.75"/>
</svg>

<!-- Traffic light left -->
<div class="light-pole light-pole-left">
  <div class="light-arm"></div>
  <div class="traffic-light">
    <div class="bulb red-on"></div>
    <div class="bulb yellow"></div>
    <div class="bulb green"></div>
  </div>
</div>

<!-- Traffic light right -->
<div class="light-pole light-pole-right">
  <div class="light-arm"></div>
  <div class="traffic-light">
    <div class="bulb red-on"></div>
    <div class="bulb yellow"></div>
    <div class="bulb green"></div>
  </div>
</div>

<div class="vignette"></div>

<button class="btn-wallet" onclick="alert('Connect Wallet clicked')">
  <div class="wallet-dot"></div>
  Connect Wallet
</button>

<button class="btn-start" onclick="alert('Game starting...')">
  START
</button>

</body>
</html>
