<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BASE RACER — Drive on Base</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'Arial Black', Arial, sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ── SKY ─────────────────────────────────────────────── */
  .sky {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 38%;
    background: linear-gradient(to bottom, #0d1117 0%, #1a2a1a 60%, #2d4a2d 100%);
  }

  /* ── GROUND ──────────────────────────────────────────── */
  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 62%;
    background: #1a1a1a;
  }

  /* ── GRASS ───────────────────────────────────────────── */
  .grass-left, .grass-right {
    position: absolute;
    bottom: 0;
    height: 62%;
    width: 28%;
    background: repeating-linear-gradient(
      90deg,
      #1a3a1a 0px, #1a3a1a 6px,
      #162e16 6px, #162e16 12px
    );
  }
  .grass-left  { left: 0; }
  .grass-right { right: 0; }

  /* ── HORIZON GLOW ────────────────────────────────────── */
  .horizon-glow {
    position: absolute;
    top: 36%; left: 50%;
    transform: translateX(-50%);
    width: 100%; height: 6%;
    background: radial-gradient(ellipse at center, #1e4d1e55 0%, transparent 70%);
  }

  /* ── TRAFFIC LIGHT POLES ─────────────────────────────── */
  .light-pole {
    position: absolute;
    bottom: 40%;
    width: 10px;
    height: 180px;
    background: #444;
    border-radius: 2px;
    z-index: 10;
  }
  .light-pole-left  { left:  calc(50% - 190px); }
  .light-pole-right { right: calc(50% - 190px); }

  .light-arm {
    position: absolute;
    top: 20px;
    height: 10px;
    width: 60px;
    background: #444;
    border-radius: 2px;
  }
  .light-pole-left  .light-arm { left: 10px; }
  .light-pole-right .light-arm { right: 10px; }

  .traffic-light {
    position: absolute;
    background: #111;
    border: 2px solid #555;
    border-radius: 8px;
    padding: 8px 6px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    top: 0;
    z-index: 11;
  }
  .light-pole-left  .traffic-light { left:  60px; transform: translateX(-50%); }
  .light-pole-right .traffic-light { right: 60px; transform: translateX(50%);  }

  .bulb {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid #333;
    background: #1a1a1a;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .bulb.red-on {
    background: #ff2020;
    box-shadow: 0 0 14px #ff2020, 0 0 30px #ff000088;
    animation: blinkRed 1.1s ease-in-out infinite;
  }
  .bulb.yellow-on {
    background: #f5c842;
    box-shadow: 0 0 14px #f5c842, 0 0 30px #f5c84288;
    animation: none;
  }
  .bulb.green-on {
    background: #22c55e;
    box-shadow: 0 0 14px #22c55e, 0 0 30px #22c55e88;
    animation: none;
  }

  @keyframes blinkRed {
    0%, 100% { box-shadow: 0 0 14px #ff2020, 0 0 30px #ff000088; opacity: 1;    }
    50%       { box-shadow: 0 0  6px #ff2020, 0 0 10px #ff000044; opacity: 0.75; }
  }

  /* ── VIGNETTE ────────────────────────────────────────── */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 20;
  }

  /* ── TOP BAR ─────────────────────────────────────────── */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, transparent 100%);
  }

  .game-logo {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #fff;
    text-shadow: 0 0 20px rgba(0,82,255,0.6);
  }
  .game-logo span { color: #0052FF; }

  .top-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Social links */
  .social-links {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .contact-label {
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.5px;
    margin-right: 2px;
  }
  .social-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 6px 10px;
    color: rgba(255,255,255,0.8);
    font-family: Arial, sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: background 0.15s, border-color 0.15s;
    cursor: pointer;
  }
  .social-btn:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.35);
    color: #fff;
  }
  .social-btn svg { flex-shrink: 0; }

  /* Wallet button */
  .btn-wallet {
    z-index: 30;
    background: rgba(0,82,255,0.2);
    border: 1.5px solid rgba(0,82,255,0.5);
    color: #e0e0e0;
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 9px 18px;
    border-radius: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 12px rgba(0,82,255,0.25);
    white-space: nowrap;
  }
  .btn-wallet:hover {
    background: rgba(0,82,255,0.35);
    border-color: rgba(0,82,255,0.8);
    box-shadow: 0 0 20px rgba(0,82,255,0.45);
  }
  .btn-wallet.connected {
    background: rgba(34,197,94,0.12);
    border-color: rgba(34,197,94,0.45);
    color: #86efac;
    box-shadow: 0 0 12px rgba(34,197,94,0.2);
    font-family: monospace;
    font-size: 12px;
  }
  .wallet-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #0052FF;
    box-shadow: 0 0 6px #0052FF;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .btn-wallet.connected .wallet-dot {
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e;
    animation: blink 1.5s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── TITLE OVERLAY ───────────────────────────────────── */
  .title-block {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 25;
    text-align: center;
    pointer-events: none;
  }
  .title-main {
    font-size: clamp(42px, 8vw, 88px);
    font-weight: 900;
    letter-spacing: 8px;
    color: #fff;
    line-height: 0.9;
    text-shadow:
      0 0 40px rgba(0,82,255,0.5),
      0 4px 20px rgba(0,0,0,0.8);
  }
  .title-main span { color: #0052FF; }
  .title-sub {
    font-family: Arial, sans-serif;
    font-size: clamp(11px, 1.5vw, 14px);
    color: rgba(255,255,255,0.45);
    letter-spacing: 4px;
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* ── START BUTTON ────────────────────────────────────── */
  .btn-start {
    position: absolute;
    bottom: 16%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    background: linear-gradient(90deg, #0052FF 0%, #c0192a 100%);
    border: none;
    color: #ffffff;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    padding: 18px 64px;
    cursor: pointer;
    border-radius: 14px;
    transition: filter 0.15s, transform 0.1s, box-shadow 0.2s;
    white-space: nowrap;
    box-shadow: 0 0 30px rgba(0,82,255,0.35), 0 8px 30px rgba(0,0,0,0.5);
  }
  .btn-start:hover {
    filter: brightness(1.15);
    transform: translateX(-50%) scale(1.06);
    box-shadow: 0 0 50px rgba(0,82,255,0.55), 0 8px 30px rgba(0,0,0,0.5);
  }
  .btn-start:active { transform: translateX(-50%) scale(0.97); }
  .btn-start:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    filter: none;
  }

  /* ── COUNTDOWN OVERLAY ───────────────────────────────── */
  #countdown-overlay {
    display: none;
    position: absolute;
    bottom: 16%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 35;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 40px currentColor;
    pointer-events: none;
    letter-spacing: 4px;
  }

  /* ── FOOTER ──────────────────────────────────────────── */
  .footer-note {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
    white-space: nowrap;
    pointer-events: none;
  }

  /* ── TOAST / MODAL ───────────────────────────────────── */
  #toast {
    display: none;
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    background: rgba(10,20,40,0.95);
    border: 1px solid rgba(0,82,255,0.4);
    border-radius: 12px;
    padding: 14px 24px;
    color: #e0e0e0;
    font-family: Arial, sans-serif;
    font-size: 13px;
    text-align: center;
    backdrop-filter: blur(16px);
    min-width: 280px;
    max-width: 90vw;
    box-shadow: 0 4px 30px rgba(0,0,0,0.6);
  }
  #toast.error { border-color: rgba(239,68,68,0.5); }
  #toast.success { border-color: rgba(34,197,94,0.5); color: #86efac; }

  /* ── SCORE MODAL ─────────────────────────────────────── */
  #score-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    align-items: center;

  #score-modal.open { display: flex; }
  .modal-card {
    background: rgba(8,16,32,0.97);
    border: 1px solid rgba(0,82,255,0.35);
    border-radius: 20px;
    padding: 40px 36px;

    max-width: 360px;

  .modal-card h2 {
    font-size: 32px;
    font-weight: 900;
    color: #ef4444;
    letter-spacing: 4px;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(239,68,68,0.5);
  }
  .score-block {
    background: rgba(0,82,255,0.08);
    border: 1px solid rgba(0,82,255,0.25);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .score-label { display: block; font-family: Arial, sans-serif; font-size: 11px; color: #6b8cae; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .score-value { font-size: 48px; font-weight: 900; color: #60a5fa; display: block; text-shadow: 0 0 20px #0052FF; }

  .tx-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,82,255,0.06);
    border: 1px solid rgba(0,82,255,0.18);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 18px;
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: #60a5fa;
    min-height: 46px;
  }
  .tx-row.success { border-color: rgba(34,197,94,0.35); color: #86efac; }
  .tx-row.error   { border-color: rgba(239,68,68,0.35); color: #fca5a5; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,82,255,0.3);
    border-top-color: #0052FF;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .modal-btn-primary {
    background: #0052FF;
    border: none;
    color: #fff;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 14px 24px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,82,255,0.35);
  }
  .modal-btn-primary:hover {
    background: #1a66ff;
    box-shadow: 0 4px 30px rgba(0,82,255,0.6);
  }
  .modal-btn-ghost {
    background: transparent;
    border: 1px solid rgba(107,140,174,0.3);
    color: #6b8cae;
    font-family: Arial, sans-serif;
    font-size: 13px;
    padding: 11px 24px;
    border-radius: 10px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .modal-btn-ghost:hover { color: #e0e0e0; border-color: #6b8cae; }

  .tx-link { color: #22c55e; font-size: 11px; word-break: break-all; }
  .tx-link a { color: inherit; }

  /* ── NETWORK NOTE ────────────────────────────────────── */
  .network-note {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1px;
    white-space: nowrap;
  }
</style>
</head>

<script>
// ════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════
const BASE_CHAIN_ID   = 8453n;
const BASE_RPC        = 'https://mainnet.base.org';
const BASESCAN_TX     = 'https://basescan.org/tx/';

// Minimal contract bytecode: stores a uint256 score in storage slot 0
// Solidity equivalent: contract ScoreRecord { uint256 public score; constructor(uint256 s){ score = s; } }
function buildBytecode(score) {
  // score as 32-byte hex
  const scoreHex = score.toString(16).padStart(64, '0');
  // Constructor: PUSH32 score, PUSH1 0x00, SSTORE, then return empty runtime
  return (
    '0x' +
    '7f' + scoreHex +   // PUSH32 <score>
    '60' + '00' +       // PUSH1 0x00
    '55' +              // SSTORE slot0 = score
    '60' + '00' +       // PUSH1 0x00  (runtime size)
    '60' + '00' +       // PUSH1 0x00  (runtime offset)
    'f3'                // RETURN
  );
}

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let provider = null;
let signer   = null;
let account  = null;

// ════════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════════
function shorten(addr) { return addr.slice(0,5) + '…' + addr.slice(-4); }

function showToast(msg, type = '', ms = 3500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = type;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display = 'none'; }, ms);
}

function setWalletUI(addr) {
  const btn = document.getElementById('btn-wallet');
  const lbl = document.getElementById('wallet-label');
  if (addr) {
    lbl.textContent = shorten(addr);
    btn.classList.add('connected');
    window.connectedAddress = addr;
  } else {
    lbl.textContent = 'Connect Wallet';
    btn.classList.remove('connected');
    window.connectedAddress = null;
  }
}

// ════════════════════════════════════════════════════════════
//  TRAFFIC LIGHT HELPERS
// ════════════════════════════════════════════════════════════
function setLight(color) {
  // color: 'red' | 'yellow' | 'green' | 'off'
  ['red','yellow','green'].forEach(c => {
    const on = c === color;
    document.getElementById(`bulb-l-${c}`).className = 'bulb' + (on ? ` ${c}-on` : '');
    document.getElementById(`bulb-r-${c}`).className = 'bulb' + (on ? ` ${c}-on` : '');
  });
}

// ════════════════════════════════════════════════════════════
//  CONNECT WALLET
// ════════════════════════════════════════════════════════════
async function connectWallet() {
  if (!window.ethereum) {
    showToast('🦊 No EVM wallet found. Please install MetaMask.', 'error');
    return false;
  }
  try {
    // Request accounts
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    if (!accounts || !accounts.length) throw new Error('No accounts returned');
    account = accounts[0];

    // Check / switch to Base
    const chainIdHex = await window.ethereum.request({ method: 'eth_chainId' });
    if (BigInt(chainIdHex) !== BASE_CHAIN_ID) {
      try {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: '0x2105' }] // 8453 in hex
        });
      } catch (switchErr) {
        if (switchErr.code === 4902) {
          // Add Base chain
          await window.ethereum.request({
            method: 'wallet_addEthereumChain',
            params: [{
              chainId: '0x2105',
              chainName: 'Base',
              nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
              rpcUrls: [BASE_RPC],
              blockExplorerUrls: ['https://basescan.org']
            }]
          });
        } else throw switchErr;
      }
    }

    provider = new ethers.BrowserProvider(window.ethereum);
    signer   = await provider.getSigner();
    setWalletUI(account);
    showToast('✓ Wallet connected — ' + shorten(account), 'success');
    return true;
  } catch (err) {
    console.error(err);
    showToast('Connection cancelled or failed.', 'error');
    return false;
  }
}

// ════════════════════════════════════════════════════════════
//  DEPLOY SCORE CONTRACT ON BASE
// ════════════════════════════════════════════════════════════
async function deployScoreContract(score) {
  const txRow  = document.getElementById('tx-row');
  const txMsg  = document.getElementById('tx-msg');
  const txLink = document.getElementById('tx-link-row');
  const spinner = document.getElementById('tx-spinner');

  txRow.className  = 'tx-row';
  txLink.className = 'tx-link hidden';
  spinner.style.display = 'block';
  txMsg.textContent = 'Waiting for wallet signature…';

  try {
    const bytecode = buildBytecode(score);
    const tx = await signer.sendTransaction({ data: bytecode });
    txMsg.textContent = 'Deploying to Base… (this may take a moment)';

    const receipt = await tx.wait();
    spinner.style.display = 'none';
    txRow.className  = 'tx-row success';
    txMsg.textContent = '✓ Score recorded on Base!';
    txLink.className  = 'tx-link';
    txLink.innerHTML  =
      `<a href="${BASESCAN_TX}${receipt.hash}" target="_blank">View on Basescan ↗</a>`;
  } catch (err) {
    console.error(err);
    spinner.style.display = 'none';
    txRow.className  = 'tx-row error';
    txMsg.textContent = err.code === 4001
      ? '✕ Signature rejected.'
      : '✕ Transaction failed. Check wallet balance.';
  }
}

// ════════════════════════════════════════════════════════════
//  GAME SIMULATION  (replace with your real game.js logic)
// ════════════════════════════════════════════════════════════
let gameRunning = false;
let gameScore   = 0;
let gameTimer   = null;

function startGameSimulation() {
  // ── Countdown sequence: Red → Yellow → Green → GO ──
  const btnStart   = document.getElementById('btn-start');
  const countdown  = document.getElementById('countdown-overlay');
  btnStart.style.display    = 'none';
  countdown.style.display   = 'block';

  setLight('red');
  countdown.textContent = '';

  setTimeout(() => {
    setLight('yellow');
    countdown.textContent = '';
  }, 1000);

  setTimeout(() => {
    setLight('green');
    countdown.style.color = '#22c55e';
    countdown.style.textShadow = '0 0 40px #22c55e';
    countdown.textContent = 'GO!';
  }, 2000);

  setTimeout(() => {
    countdown.style.display = 'none';
    countdown.style.color = '';
    countdown.style.textShadow = '';
    setLight('off');

    // ── Simple score ticker (replace with real game) ──
    gameRunning = true;
    gameScore   = 0;
    gameTimer   = setInterval(() => {
      gameScore += Math.floor(Math.random() * 10) + 1;
      // Simulated crash after 4–8 seconds
    }, 200);

    // Simulated game-over after random time
    const crashAfter = 4000 + Math.random() * 4000;
    setTimeout(endGame, crashAfter);
  }, 3000);
}

function endGame() {
  if (gameTimer) clearInterval(gameTimer);
  gameRunning = false;
  setLight('red');

  // Show score modal
  document.getElementById('modal-score').textContent = gameScore;
  document.getElementById('score-modal').classList.add('open');

  // Auto-deploy if wallet connected
  if (signer) {
    deployScoreContract(gameScore);
  } else {
    const txRow = document.getElementById('tx-row');
    const spinner = document.getElementById('tx-spinner');
    spinner.style.display = 'none';
    txRow.className = 'tx-row';
    document.getElementById('tx-msg').textContent =
      'Connect wallet to record score on Base.';
  }
}

function resetToMenu() {
  document.getElementById('score-modal').classList.remove('open');
  document.getElementById('btn-start').style.display = '';
  setLight('off');
}

// ════════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ════════════════════════════════════════════════════════════
document.getElementById('btn-wallet').addEventListener('click', async () => {
  if (account) return; // already connected
  await connectWallet();
});

document.getElementById('btn-start').addEventListener('click', async () => {
  if (!account) {
    const ok = await connectWallet();
    if (!ok) return;
  }
  startGameSimulation();
});

document.getElementById('btn-play-again').addEventListener('click', () => {
  resetToMenu();
  startGameSimulation();
});

document.getElementById('btn-menu').addEventListener('click', resetToMenu);

// Auto-reconnect if already approved
window.addEventListener('load', async () => {
  if (window.ethereum) {
    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
    if (accounts && accounts.length) {
      account  = accounts[0];
      provider = new ethers.BrowserProvider(window.ethereum);
      signer   = await provider.getSigner();
      setWalletUI(account);
    }
    window.ethereum.on('accountsChanged', (accs) => {
      account = accs[0] || null;
      if (account) {
        provider = new ethers.BrowserProvider(window.ethereum);
        provider.getSigner().then(s => { signer = s; });
      } else { signer = null; }
      setWalletUI(account);
    });
  }
  setLight('off');
});
</script>
