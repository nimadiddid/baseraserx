<title>BaseRacerX</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background:#0a0a0a; font-family:'Arial Black',Arial,sans-serif; min-height:100vh; overflow:hidden; position:relative; }


  .sky { position:absolute; top:0; left:0; right:0; height:38%; background:linear-gradient(to bottom,#0d1117 0%,#1a2a1a 60%,#2d4a2d 100%); }
  .ground { position:absolute; bottom:0; left:0; right:0; height:62%; background:#1a1a1a; }
  .grass-left,.grass-right { position:absolute; bottom:0; height:62%; width:28%; background:repeating-linear-gradient(90deg,#1a3a1a 0px,#1a3a1a 6px,#162e16 6px,#162e16 12px); }
  .grass-left { left:0; } .grass-right { right:0; }
  .horizon-glow { position:absolute; top:36%; left:50%; transform:translateX(-50%); width:100%; height:6%; background:radial-gradient(ellipse at center,#1e4d1e55 0%,transparent 70%); }

  .light-pole { position:absolute; bottom:40%; width:10px; height:180px; background:#444; border-radius:2px; z-index:10; }
  .light-pole-left  { left:calc(50% - 190px); }
  .light-pole-right { right:calc(50% - 190px); }
  .light-arm { position:absolute; top:20px; height:10px; width:60px; background:#444; border-radius:2px; }
  .light-pole-left .light-arm  { left:10px; }
  .light-pole-right .light-arm { right:10px; }
  .traffic-light { position:absolute; background:#111; border:2px solid #555; border-radius:8px; padding:8px 6px; display:flex; flex-direction:column; gap:6px; top:0; z-index:11; }
  .light-pole-left .traffic-light  { left:60px;  transform:translateX(-50%); }
  .light-pole-right .traffic-light { right:60px; transform:translateX(50%); }
  .bulb { width:22px; height:22px; border-radius:50%; border:1px solid #333; background:#1a1a1a; transition:background .3s,box-shadow .3s; }
  .bulb.red-on    { background:#ff2020; box-shadow:0 0 14px #ff2020,0 0 30px #ff000088; animation:blinkRed 1.1s ease-in-out infinite; }
  .bulb.yellow-on { background:#f5c842; box-shadow:0 0 14px #f5c842,0 0 30px #f5c84288; }
  .bulb.green-on  { background:#22c55e; box-shadow:0 0 14px #22c55e,0 0 30px #22c55e88; }
  @keyframes blinkRed { 0%,100%{box-shadow:0 0 14px #ff2020,0 0 30px #ff000088;opacity:1} 50%{box-shadow:0 0 6px #ff2020,0 0 10px #ff000044;opacity:.75} }

  .vignette { position:absolute; inset:0; background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.65) 100%); pointer-events:none; z-index:20; }

  .top-bar { position:absolute; top:0; left:0; right:0; z-index:30; display:flex; align-items:center; justify-content:space-between; padding:16px 24px; background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,transparent 100%); }
  .game-logo { font-size:18px; font-weight:900; letter-spacing:3px; color:#fff; text-shadow:0 0 20px rgba(0,82,255,.6); }
  .game-logo span { color:#0052FF; }

  .btn-wallet { z-index:30; background:rgba(0,82,255,.2); border:1px solid rgba(0,82,255,.5); color:#e0e0e0; font-family:Arial,sans-serif; font-size:11px; font-weight:700; letter-spacing:.3px; padding:5px 11px; border-radius:18px; cursor:pointer; display:flex; align-items:center; gap:5px; transition:background .15s,border-color .15s,box-shadow .15s; box-shadow:0 0 8px rgba(0,82,255,.2); white-space:nowrap; }
  .btn-wallet:hover { background:rgba(0,82,255,.35); border-color:rgba(0,82,255,.8); box-shadow:0 0 20px rgba(0,82,255,.45); }
  .btn-wallet.connected { background:rgba(34,197,94,.12); border-color:rgba(34,197,94,.45); color:#86efac; box-shadow:0 0 8px rgba(34,197,94,.15); font-family:monospace; font-size:10px; }
  .wallet-dot { width:6px; height:6px; border-radius:50%; background:#0052FF; box-shadow:0 0 4px #0052FF; flex-shrink:0; transition:background .3s; }
  .btn-wallet.connected .wallet-dot { background:#22c55e; box-shadow:0 0 6px #22c55e; animation:blink 1.5s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  .title-block { position:absolute; top:8%; left:50%; transform:translateX(-50%); z-index:25; text-align:center; pointer-events:none; }
  .title-main { font-size:clamp(42px,8vw,88px); font-weight:900; letter-spacing:8px; color:#fff; line-height:.9; text-shadow:0 0 40px rgba(0,82,255,.5),0 4px 20px rgba(0,0,0,.8); }
  .title-main span { color:#0052FF; }
  .title-sub { font-family:Arial,sans-serif; font-size:clamp(11px,1.5vw,14px); color:rgba(255,255,255,.45); letter-spacing:4px; margin-top:8px; text-transform:uppercase; }

  .btn-start { position:absolute; bottom:16%; left:50%; transform:translateX(-50%); z-index:30; background:linear-gradient(90deg,#0052FF 0%,#c0192a 100%); border:none; color:#fff; font-family:'Arial Black',Arial,sans-serif; font-size:clamp(20px,3vw,28px); font-weight:900; letter-spacing:6px; text-transform:uppercase; padding:18px 64px; cursor:pointer; border-radius:14px; transition:filter .15s,transform .1s,box-shadow .2s; white-space:nowrap; box-shadow:0 0 30px rgba(0,82,255,.35),0 8px 30px rgba(0,0,0,.5); }
  .btn-start:hover { filter:brightness(1.15); transform:translateX(-50%) scale(1.06); box-shadow:0 0 50px rgba(0,82,255,.55),0 8px 30px rgba(0,0,0,.5); }
  .btn-start:active { transform:translateX(-50%) scale(.97); }
  .btn-start:disabled { opacity:.45; cursor:not-allowed; filter:none; }

  #countdown-overlay { display:none; position:absolute; bottom:16%; left:50%; transform:translateX(-50%); z-index:35; font-family:'Arial Black',Arial,sans-serif; font-size:64px; font-weight:900; color:#fff; text-shadow:0 0 40px currentColor; pointer-events:none; letter-spacing:4px; }

  .network-note { position:absolute; bottom:8%; left:50%; transform:translateX(-50%); z-index:30; font-family:Arial,sans-serif; font-size:11px; color:rgba(255,255,255,.25); letter-spacing:1px; white-space:nowrap; }
  .footer-note { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:30; font-family:Arial,sans-serif; font-size:12px; color:rgba(255,255,255,.3); letter-spacing:1px; white-space:nowrap; pointer-events:none; }

  #toast { display:none; position:fixed; bottom:60px; left:50%; transform:translateX(-50%); z-index:100; background:rgba(10,20,40,.95); border:1px solid rgba(0,82,255,.4); border-radius:12px; padding:14px 24px; color:#e0e0e0; font-family:Arial,sans-serif; font-size:13px; text-align:center; backdrop-filter:blur(16px); min-width:280px; max-width:90vw; box-shadow:0 4px 30px rgba(0,0,0,.6); }
  #toast.error   { border-color:rgba(239,68,68,.5); }
  #toast.success { border-color:rgba(34,197,94,.5); color:#86efac; }

  /* ── GAME OVERLAY ── */
  #game-root { display:none; position:fixed; inset:0; z-index:50; background:#000; }
  #game-root.active { display:block; }

  /* HUD */
  .hud { position:absolute; top:0; left:0; right:0; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:linear-gradient(180deg,rgba(0,0,0,.75) 0%,transparent 100%); gap:16px; }
  .hud-left,.hud-right { display:flex; flex-direction:column; gap:2px; min-width:70px; }
  .hud-right { align-items:flex-end; }
  .hud-label { font-size:10px; color:#6b8cae; letter-spacing:1.5px; text-transform:uppercase; font-family:Arial,sans-serif; }
  .hud-value { font-size:24px; font-weight:800; color:#fff; text-shadow:0 0 12px #0052FF; }
  .hud-center { flex:1; max-width:200px; margin:0 auto; }
  .health-bar-wrap { height:6px; background:rgba(255,255,255,.1); border-radius:3px; overflow:hidden; }
  .health-bar { height:100%; width:8%; background:linear-gradient(90deg,#0052FF,#60A5FA); border-radius:3px; transition:width .2s; }

  .btn-secondary { background:rgba(0,82,255,.25); border:1.5px solid rgba(0,82,255,.5); color:#93C5FD; font-size:14px; font-weight:800; letter-spacing:1px; padding:14px; border-radius:14px; cursor:pointer; width:100%; transition:background .15s; }
  .btn-secondary:hover { background:rgba(0,82,255,.4); }
  #leaderboard-overlay { scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.15) transparent; }

  /* Pause button */
  #btn-pause { background:rgba(255,255,255,.1); border:1.5px solid rgba(255,255,255,.25); color:#fff; font-size:16px; width:38px; height:38px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s,border-color .15s; flex-shrink:0; }
  #btn-pause:hover { background:rgba(255,255,255,.22); border-color:rgba(255,255,255,.5); }

  /* Game over card */
  #gameover-card { display:none; position:absolute; inset:0; z-index:20; background:rgba(0,5,15,.9); align-items:center; justify-content:center; }
  #gameover-card.show { display:flex; }
  .go-card { background:rgba(10,20,40,.95); border:1px solid rgba(239,68,68,.3); border-radius:16px; padding:40px 36px; text-align:center; max-width:380px; width:90%; backdrop-filter:blur(20px); box-shadow:0 0 80px rgba(239,68,68,.15),0 24px 60px rgba(0,0,0,.7); }
  .go-card .crash-icon { font-size:48px; margin-bottom:8px; animation:shake .5s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
  .go-card h2 { font-size:36px; font-weight:900; color:#ef4444; letter-spacing:4px; margin-bottom:24px; text-shadow:0 0 20px rgba(239,68,68,.5); }
  .final-score-block { background:rgba(0,82,255,.1); border:1px solid rgba(0,82,255,.3); border-radius:12px; padding:20px; margin-bottom:16px; }
  .final-label { display:block; font-size:11px; color:#6b8cae; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; font-family:Arial,sans-serif; }
  .final-value { font-size:52px; font-weight:900; color:#60A5FA; display:block; text-shadow:0 0 20px #0052FF; }
  .go-stats { display:flex; gap:12px; margin-bottom:20px; }
  .go-stat { flex:1; background:rgba(255,255,255,.04); border-radius:8px; padding:10px; display:flex; flex-direction:column; gap:3px; font-family:Arial,sans-serif; font-size:12px; color:#6b8cae; }
  .go-stat strong { font-size:18px; color:#fff; font-weight:700; }
  .tx-status { display:flex; align-items:center; gap:10px; background:rgba(0,82,255,.08); border:1px solid rgba(0,82,255,.2); border-radius:8px; padding:12px 14px; margin-bottom:16px; font-family:Arial,sans-serif; font-size:13px; color:#60A5FA; }
  .tx-spinner { width:16px; height:16px; border:2px solid rgba(0,82,255,.3); border-top-color:#0052FF; border-radius:50%; animation:spin .8s linear infinite; flex-shrink:0; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .tx-done { display:flex; align-items:center; justify-content:center; gap:8px; color:#22c55e; font-family:Arial,sans-serif; font-size:13px; margin-bottom:16px; }
  .tx-done a { color:#22c55e; }
  .hidden { display:none!important; }
  .go-buttons { display:flex; flex-direction:column; gap:10px; }
  .btn-primary { width:100%; background:#0052FF; color:#fff; border:none; border-radius:10px; padding:16px 24px; font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background .2s,transform .1s; box-shadow:0 4px 20px rgba(0,82,255,.4); font-family:'Arial Black',Arial,sans-serif; letter-spacing:1px; }
  .btn-primary:hover { background:#1a66ff; box-shadow:0 4px 30px rgba(0,82,255,.65); }
  .btn-primary:active { transform:scale(.98); }
  .btn-ghost { width:100%; background:transparent; color:#6b8cae; border:1px solid rgba(107,140,174,.3); border-radius:10px; padding:12px 24px; font-size:14px; cursor:pointer; transition:color .2s,border-color .2s; font-family:Arial,sans-serif; }
  .btn-ghost:hover { color:#fff; border-color:#6b8cae; }

  #game-canvas { display:block; width:100%; height:100%; position:absolute; inset:0; }
</style>
</head>

<script>
// ── Menu wallet logic ──
const BASE_CHAIN_ID_MENU = 8453n;
const BASE_RPC_MENU      = 'https://api.developer.coinbase.com/rpc/v1/base/bc_otm6g9zw';

function shorten(a){ return a.slice(0,5)+'…'+a.slice(-4); }

function showToast(msg, type, ms){
  ms = ms || 3500;
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type || ''; t.style.display = 'block';
  clearTimeout(t._t); t._t = setTimeout(function(){ t.style.display = 'none'; }, ms);
}

function setWalletUI(addr){
  const btn = document.getElementById('btn-wallet');
  const lbl = document.getElementById('wallet-label');
  if(addr){ lbl.textContent = shorten(addr); btn.classList.add('connected'); }
  else    { lbl.textContent = 'Connect Wallet'; btn.classList.remove('connected'); }
}

function setLight(color){
  ['red','yellow','green'].forEach(function(c){
    const on = c === color;
    document.getElementById('bulb-l-'+c).className = 'bulb' + (on ? ' '+c+'-on' : '');
    document.getElementById('bulb-r-'+c).className = 'bulb' + (on ? ' '+c+'-on' : '');
  });
}

async function connectWallet(){
  if(!window.ethereum){ showToast('🦊 No EVM wallet found.','error'); return false; }
  try {
    const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
    if(!accounts || !accounts.length) throw new Error('no accounts');
    const chainHex = await window.ethereum.request({method:'eth_chainId'});
    if(BigInt(chainHex) !== BASE_CHAIN_ID_MENU){
      try {
        await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:'0x2105'}]});
      } catch(e){
        if(e.code===4902){
          await window.ethereum.request({method:'wallet_addEthereumChain',params:[{
            chainId:'0x2105', chainName:'Base',
            nativeCurrency:{name:'Ether',symbol:'ETH',decimals:18},
            rpcUrls:[BASE_RPC_MENU], blockExplorerUrls:['https://basescan.org']
          }]});
        } else throw e;
      }
    }
    const provider = new ethers.BrowserProvider(window.ethereum);
    const signer   = await provider.getSigner();
    const address  = await signer.getAddress();
    window._walletProvider = provider;
    window._walletSigner   = signer;
    window._walletAddress  = address;
    setWalletUI(address);
    showToast('✓ Connected — '+shorten(address), 'success');
    return true;
  } catch(e){ console.error(e); showToast('Connection failed.','error'); return false; }
}

function runCountdownThenStart(){
  const btnStart = document.getElementById('btn-start');
  const cd       = document.getElementById('countdown-overlay');
  btnStart.style.display = 'none';
  cd.style.display = 'block';
  setLight('red'); cd.textContent = '';
  setTimeout(function(){ setLight('yellow'); cd.textContent = ''; }, 1000);
  setTimeout(function(){
    setLight('green');
    cd.style.color = '#22c55e';
    cd.style.textShadow = '0 0 40px #22c55e';
    cd.textContent = 'GO!';
  }, 2000);
  setTimeout(function(){
    cd.style.display = 'none';
    cd.style.color = '';
    cd.style.textShadow = '';
    setLight('off');
    // Show game screen
    document.getElementById('game-root').classList.add('active');
    // startGame is defined in game.js
    if(typeof startGame === 'function') startGame();
  }, 3000);
}

document.getElementById('btn-wallet').addEventListener('click', async function(){
  if(window._walletAddress) return;
  await connectWallet();
});

document.getElementById('btn-start').addEventListener('click', async function(){
  if(!window._walletAddress){
    const ok = await connectWallet();
    if(!ok) return;
  }
  runCountdownThenStart();
});

document.getElementById('btn-pause').addEventListener('click', function(){
  if(typeof togglePause === 'function') togglePause();
});

document.getElementById('btn-play-again').addEventListener('click', function(){
  document.getElementById('gameover-card').classList.remove('show');
  if(typeof startGame === 'function') startGame();
});

document.getElementById('btn-to-menu').addEventListener('click', function(){
  document.getElementById('gameover-card').classList.remove('show');
  document.getElementById('game-root').classList.remove('active');
  document.getElementById('btn-start').style.display = '';
  setLight('off');
});

document.getElementById('btn-menu-leaderboard').addEventListener('click', function(){
  showLeaderboard();
});

document.getElementById('btn-close-lb').addEventListener('click', function(){
  const ov = document.getElementById('leaderboard-overlay');
  ov.style.display = 'none';
});

async function showLeaderboard() {
  const ov  = document.getElementById('leaderboard-overlay');
  const st  = document.getElementById('lb-status');
  const tbl = document.getElementById('lb-table');
  ov.style.display  = 'flex';
  tbl.style.display = 'none';
  st.style.display  = 'block';
  st.textContent    = 'Loading from Base...';

  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    const c = new ethers.Contract(
      '0x15609841b39Ae42EdE65832bE9FA9c3ec00282C4',
      [{name:'getBoard',type:'function',stateMutability:'view',inputs:[],outputs:[{name:'',type:'tuple[]',components:[
        {name:'player',type:'address'},{name:'score',type:'uint32'},
        {name:'timeSeconds',type:'uint32'},{name:'timestamp',type:'uint64'}
      ]}]}],
      provider
    );

    const myAddr = (await provider.listAccounts())[0]?.address?.toLowerCase() || '';
    const board  = await c.getBoard();

    // Sort by score descending
    const sorted = [...board].sort((a,b) => Number(b.score) - Number(a.score));

    if (sorted.length === 0) {
      st.textContent = 'No scores yet. Be the first!';
      return;
    }

    st.style.display = 'none';
    tbl.style.display = 'block';

    const rows = sorted.map((e, i) => {
      const addr    = e.player.toLowerCase();
      const isMe    = addr === myAddr;
      const short   = e.player.slice(0,6) + '...' + e.player.slice(-4);
      const rank    = i + 1;
      const medal   = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
      const bg      = isMe ? 'rgba(0,82,255,.18)' : i % 2 === 0 ? 'rgba(255,255,255,.03)' : 'transparent';
      const border  = isMe ? '1px solid rgba(0,82,255,.4)' : '1px solid transparent';
      return `<div style="display:flex;align-items:center;padding:10px 12px;border-radius:10px;background:${bg};border:${border};margin-bottom:4px;gap:10px;">
        <div style="width:32px;text-align:center;font-size:${rank<=3?'18':'13'}px;color:${isMe?'#60A5FA':'#6b8cae'};flex-shrink:0;">${medal}</div>
        <div style="flex:1;font-family:monospace;font-size:13px;color:${isMe?'#93C5FD':'#cdd6f4'};">
          ${short}${isMe?' <span style="color:#60A5FA;font-size:11px;font-family:Arial;">(you)</span>':''}
        </div>
        <div style="font-size:15px;font-weight:900;color:${isMe?'#60A5FA':'#fff'};margin-right:8px;">${e.score}</div>
        <div style="font-size:11px;color:#6b8cae;">${e.timeSeconds}s</div>
      </div>`;
    }).join('');

    tbl.innerHTML = `<div style="font-size:11px;color:#6b8cae;text-align:right;margin-bottom:8px;">${sorted.length} players</div>` + rows;

  } catch(err) {
    st.textContent = 'Failed to load: ' + (err.message || 'unknown error');
  }
}

// Auto-reconnect if already authorized
window.addEventListener('load', async function(){
  setLight('off');
  if(window.ethereum){
    try {
      const accounts = await window.ethereum.request({method:'eth_accounts'});
      if(accounts && accounts.length){
        const p = new ethers.BrowserProvider(window.ethereum);
        const s = await p.getSigner();
        const a = await s.getAddress();
        window._walletProvider = p;
        window._walletSigner   = s;
        window._walletAddress  = a;
        setWalletUI(a);
      }
    } catch(e){ console.error(e); }

    window.ethereum.on('accountsChanged', async function(accs){
      if(accs && accs.length){
        const p = new ethers.BrowserProvider(window.ethereum);
        const s = await p.getSigner();
        window._walletProvider = p;
        window._walletSigner   = s;
        window._walletAddress  = accs[0];
        setWalletUI(accs[0]);
      } else {
        window._walletProvider = null;
        window._walletSigner   = null;
        window._walletAddress  = null;
        setWalletUI(null);
      }
    });
  }
});
